<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f172a" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" type="image/svg+xml" href="/icon-192.svg" />
    <link rel="apple-touch-icon" href="/icon-192.svg" />
    <title>AMASS-CRM</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Service worker enabled (v3) — installable PWA with offline shell
      // + selective API cache for /companies and /contacts. Past stale-
      // chunks regression is handled inside sw.js: HTML + non-hashed
      // resources are network-first; only Vite's content-addressed
      // /assets/*.[hash].js are cache-first. See apps/web/public/sw.js.
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch((err) => {
            // SW registration failure should never break the app — log
            // and proceed without offline support.
            console.warn('SW registration failed', err);
          });
        });
      }
    </script>
  </body>
</html>
