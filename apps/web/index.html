<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f172a" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" type="image/svg+xml" href="/icon-192.svg" />
    <link rel="apple-touch-icon" href="/icon-192.svg" />
    <title>AMASS-CRM</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Service worker DISABLED. A registered SW aggressively caches the
      // app shell (index.html + referenced JS chunks) and, when a deploy
      // changes hashed filenames, serves a stale HTML pointing at missing
      // chunks → blank page that Ctrl+F5 can't clear. For the demo we
      // unregister any previously installed SW + clear its caches so
      // users on old builds recover automatically.
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then((rs) => rs.forEach((r) => r.unregister()));
        if (window.caches) caches.keys().then((ks) => ks.forEach((k) => caches.delete(k)));
      }
    </script>
  </body>
</html>
