# Railway config for the `web` service.
#
# Usage on Railway:
#   Settings → Source → Root Directory   = (leave EMPTY / blank — repo root)
#   Settings → Config-as-Code Path       = apps/web/railway.toml
#   Settings → Watch Paths               = apps/web/**, packages/shared/**

[build]
builder = "DOCKERFILE"
dockerfilePath = "apps/web/Dockerfile"
watchPatterns = ["apps/web/**", "packages/shared/**", "pnpm-lock.yaml"]

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
