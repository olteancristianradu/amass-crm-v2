# Railway config for the `web` service (Vite SPA served by nginx).
# Service Root Directory in Railway: `apps/web/`.

[build]
builder = "DOCKERFILE"
dockerfilePath = "../../apps/web/Dockerfile"
buildContextPath = "../.."

[deploy]
# nginx listens on $PORT if templated, otherwise 80 (set in the Dockerfile
# for compose; Railway passes PORT in env — nginx.conf reads it from the
# template in apps/web/Dockerfile).
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
