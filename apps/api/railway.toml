# Railway config for the `api` service.
#
# Usage on Railway:
#   Settings → Source → Root Directory   = (leave EMPTY / blank — repo root)
#   Settings → Config-as-Code Path       = apps/api/railway.toml
#   Settings → Watch Paths               = apps/api/**, packages/shared/**
#
# Railway does NOT support a custom build context path. The build context is
# always the Root Directory. That's why Root Directory must be empty here —
# the Dockerfile needs to COPY from `packages/shared` (pnpm workspace).

[build]
builder = "DOCKERFILE"
dockerfilePath = "apps/api/Dockerfile"
watchPatterns = ["apps/api/**", "packages/shared/**", "pnpm-lock.yaml"]

[deploy]
startCommand = "node dist/main.js"
healthcheckPath = "/api/v1/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
