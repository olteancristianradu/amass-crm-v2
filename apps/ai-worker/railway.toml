# Railway config for the `ai-worker` service (FastAPI).
#
# Usage on Railway:
#   Settings → Source → Root Directory   = (leave EMPTY / blank — repo root)
#   Settings → Config-as-Code Path       = apps/ai-worker/railway.toml
#   Settings → Watch Paths               = apps/ai-worker/**

[build]
builder = "DOCKERFILE"
dockerfilePath = "apps/ai-worker/Dockerfile"
watchPatterns = ["apps/ai-worker/**"]

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
