# Railway config for the `ai-worker` service (FastAPI).
# Service Root Directory in Railway: `apps/ai-worker/`.

[build]
builder = "DOCKERFILE"
dockerfilePath = "../../apps/ai-worker/Dockerfile"
buildContextPath = "../.."

[deploy]
# $PORT is injected by Railway; see CMD in the Dockerfile.
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
