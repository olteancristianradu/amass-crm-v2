# AMASS-CRM v2 — dev stack
# All services run in Docker. Same compose file is the base for prod
# (with infra/docker-compose.prod.yml as override).
#
# Bring up: docker compose -f infra/docker-compose.yml --env-file .env up -d
#
# Services:
#   postgres   :5432  (with pgvector)
#   redis      :6379
#   minio      :9000  (S3 API), :9001 (Console)
#   caddy      :80, :443
#   api        :3000
#   web        :5173
#   ai-worker  :8000

name: amass-crm

services:
  postgres:
    # pgvector image bundles Postgres 16 + pgvector extension
    image: pgvector/pgvector:pg16
    container_name: amass-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-amass_crm}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-amass_crm}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: amass-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: amass-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot init: creates the default bucket if it doesn't exist.
  minio-init:
    image: minio/mc:latest
    container_name: amass-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin};
      mc mb --ignore-existing local/${MINIO_BUCKET:-amass-files};
      mc anonymous set download local/${MINIO_BUCKET:-amass-files} || true;
      echo 'MinIO bucket ready: ${MINIO_BUCKET:-amass-files}';
      "
    restart: "no"

  caddy:
    image: caddy:2-alpine
    container_name: amass-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
      - web

  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    container_name: amass-api
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-amass-files}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      PORT: ${API_PORT:-3000}
    ports:
      - "${API_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  web:
    build:
      context: ../apps/web
      dockerfile: Dockerfile
    container_name: amass-web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-5173}:80"
    depends_on:
      - api

  ai-worker:
    build:
      context: ../apps/ai-worker
      dockerfile: Dockerfile
    container_name: amass-ai-worker
    restart: unless-stopped
    environment:
      # Redis — BullMQ queue consumer
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      # MinIO — recordings storage (after worker downloads from Twilio)
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-amass-files}
      # Twilio — download call recordings
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      # Anthropic — transcript summarisation
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      # Shared secret for AI worker → NestJS callback
      AI_WORKER_SECRET: ${AI_WORKER_SECRET:-}
      # NestJS API URL (internal docker network)
      API_URL: http://api:3000
      # Whisper model: "off" = stub, "base" = real (requires heavy ML deps)
      WHISPER_MODEL: ${WHISPER_MODEL:-off}
    ports:
      - "${AI_WORKER_PORT:-8000}:8000"
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  minio_data:
  caddy_data:
  caddy_config:
