# AMASS-CRM v2 — dev stack
# All services run in Docker. Same compose file is the base for prod
# (with infra/docker-compose.prod.yml as override).
#
# Bring up: docker compose -f infra/docker-compose.yml --env-file .env up -d
#
# Services:
#   postgres   :5432  (with pgvector)
#   redis      :6379
#   minio      :9000  (S3 API), :9001 (Console)
#   caddy      :80, :443
#   api        :3000
#   web        :5173
#   ai-worker  :8000

name: amass-crm

services:
  postgres:
    # pgvector image bundles Postgres 16 + pgvector extension
    image: pgvector/pgvector:pg16
    container_name: amass-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-amass_crm}
    ports:
      # L-1: bind to loopback only so a laptop on a public network
      # (cafe wifi, co-working) doesn't expose Postgres to the outside.
      # Override POSTGRES_BIND_HOST=0.0.0.0 if you need remote DBeaver.
      - "${POSTGRES_BIND_HOST:-127.0.0.1}:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-amass_crm}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Transaction-pooling proxy in front of Postgres. For prod/scale:
  #   DATABASE_URL       -> points at pgbouncer (6432)  — used by the app
  #   DATABASE_DIRECT_URL-> points at postgres  (5432)  — used by Prisma migrate
  # In dev it's optional; leave the service off by default (profile: prod).
  pgbouncer:
    image: edoburu/pgbouncer:1.23.1
    container_name: amass-pgbouncer
    restart: unless-stopped
    profiles: ["prod"]
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DB_NAME: ${POSTGRES_DB:-amass_crm}
      POOL_MODE: transaction
      MAX_CLIENT_CONN: "2000"
      DEFAULT_POOL_SIZE: "25"
      # Prepared statements don't work under transaction pooling.
      # Prisma should use `?pgbouncer=true&statement_cache_size=0` on DATABASE_URL.
      SERVER_RESET_QUERY: DISCARD ALL
      ADMIN_USERS: ${POSTGRES_USER:-postgres}
      AUTH_TYPE: scram-sha-256
    ports:
      - "${PGBOUNCER_BIND_HOST:-127.0.0.1}:${PGBOUNCER_PORT:-6432}:5432"
    depends_on:
      postgres:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    container_name: amass-redis
    restart: unless-stopped
    ports:
      # L-1: loopback-only by default; same override as Postgres.
      - "${REDIS_BIND_HOST:-127.0.0.1}:${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    # M-06: pinned to a specific release instead of `:latest` to avoid
    # surprise upgrades on a `docker compose pull`. Bump deliberately.
    image: minio/minio:RELEASE.2024-10-13T13-34-11Z
    container_name: amass-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      # L-1: loopback-only by default. The API reaches MinIO via the
      # docker network; only local dev (browser previews, mc CLI) needs
      # the host port, and that's always on this machine.
      - "${MINIO_BIND_HOST:-127.0.0.1}:${MINIO_PORT:-9000}:9000"
      - "${MINIO_BIND_HOST:-127.0.0.1}:${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot init: creates the default bucket if it doesn't exist.
  minio-init:
    # M-06: pinned to a specific mc release.
    image: minio/mc:RELEASE.2024-10-08T09-37-26Z
    container_name: amass-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin};
      mc mb --ignore-existing local/${MINIO_BUCKET:-amass-files};
      mc anonymous set none local/${MINIO_BUCKET:-amass-files} || true;
      echo 'MinIO bucket ready (private; access via presigned URLs only): ${MINIO_BUCKET:-amass-files}';
      "
    restart: "no"

  caddy:
    image: caddy:2-alpine
    container_name: amass-caddy
    restart: unless-stopped
    # Explicit upstream DNS — some host configurations (Ubuntu with
    # systemd-resolved listening on 127.0.0.53) leak a loopback resolver
    # into the container's /etc/resolv.conf, which the container cannot
    # reach. That breaks ACME (Caddy can't look up letsencrypt.org) and
    # leaves :443 never bound.
    dns:
      - 1.1.1.1
      - 8.8.8.8
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    # C-17: wait for healthy api + web before starting Caddy. Without
    # `condition: service_healthy`, Caddy used to come up before the API
    # was ready and the first few requests failed with 502 until Nest
    # finished booting. Healthchecks are wired on the api + web services
    # above; this clause turns them into a real gating condition.
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy

  api:
    build:
      # Build context = repo root so pnpm workspace (`@amass/shared`) resolves.
      context: ..
      dockerfile: apps/api/Dockerfile
    container_name: amass-api
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-amass-files}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      AI_WORKER_SECRET: ${AI_WORKER_SECRET:-}
      AI_WORKER_URL: ${AI_WORKER_URL:-http://ai-worker:8000}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173}
      PUBLIC_API_BASE_URL: ${PUBLIC_API_BASE_URL:-}
      METRICS_AUTH_TOKEN: ${METRICS_AUTH_TOKEN:-}
      METRICS_ALLOWED_IPS: ${METRICS_ALLOWED_IPS:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      SENTRY_DSN: ${SENTRY_DSN:-}
      # Optional integrations — forwarded if set in .env, empty string otherwise
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_WEBHOOK_BASE_URL: ${TWILIO_WEBHOOK_BASE_URL:-}
      TWILIO_SMS_FROM: ${TWILIO_SMS_FROM:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      # Mock service overrides — when `pnpm mocks:up` is running, point
      # every external SDK at the local container instead of the real
      # provider. Each takes the producer's $VAR or empty string fallback,
      # so unset vars don't propagate "undefined" into the env.
      STRIPE_API_HOST: ${STRIPE_API_HOST:-}
      STRIPE_API_PORT: ${STRIPE_API_PORT:-}
      STRIPE_API_PROTOCOL: ${STRIPE_API_PROTOCOL:-}
      STRIPE_PRICE_STARTER: ${STRIPE_PRICE_STARTER:-}
      STRIPE_PRICE_GROWTH: ${STRIPE_PRICE_GROWTH:-}
      STRIPE_PRICE_ENTERPRISE: ${STRIPE_PRICE_ENTERPRISE:-}
      TWILIO_BASE_URL: ${TWILIO_BASE_URL:-}
      META_GRAPH_BASE_URL: ${META_GRAPH_BASE_URL:-}
      ANAF_BASE_URL: ${ANAF_BASE_URL:-}
      ANAF_OAUTH_BASE_URL: ${ANAF_OAUTH_BASE_URL:-}
      # Tenant identity passed to UBL builder. In prod each tenant should
      # have its own row; this dev shape accepts a single global default.
      ANAF_VAT: ${ANAF_VAT:-}
      ANAF_COMPANY_NAME: ${ANAF_COMPANY_NAME:-}
      ANAF_ADDRESS: ${ANAF_ADDRESS:-}
      ANAF_CITY: ${ANAF_CITY:-}
      ANAF_COUNTY: ${ANAF_COUNTY:-}
      ANAF_CLIENT_ID: ${ANAF_CLIENT_ID:-}
      ANAF_CLIENT_SECRET: ${ANAF_CLIENT_SECRET:-}
      ANAF_SANDBOX: ${ANAF_SANDBOX:-}
      GOOGLE_API_BASE_URL: ${GOOGLE_API_BASE_URL:-}
      GOOGLE_OAUTH_BASE_URL: ${GOOGLE_OAUTH_BASE_URL:-}
      MICROSOFT_GRAPH_BASE_URL: ${MICROSOFT_GRAPH_BASE_URL:-}
      MICROSOFT_OAUTH_BASE_URL: ${MICROSOFT_OAUTH_BASE_URL:-}
      WEBHOOK_TRUSTED_HOSTS: ${WEBHOOK_TRUSTED_HOSTS:-}
      PORT: ${API_PORT:-3000}
    ports:
      - "${API_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    # C-16: matches the HEALTHCHECK in apps/api/Dockerfile. Compose
    # uses this so dependents (Caddy) can wait on `condition: service_healthy`.
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:'+(process.env.PORT||3000)+'/api/v1/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    container_name: amass-web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-5173}:8080"
    depends_on:
      - api
    # C-16/C-17: nginx healthcheck so Caddy can wait on condition:
    # service_healthy. nginx-unprivileged:alpine ships wget; --quiet
    # + --spider gives us a true/false on the index page.
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:8080/"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  ai-worker:
    build:
      context: ..
      dockerfile: apps/ai-worker/Dockerfile
    container_name: amass-ai-worker
    restart: unless-stopped
    environment:
      # Redis — BullMQ queue consumer
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      # MinIO — recordings storage (after worker downloads from Twilio)
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-amass-files}
      # Twilio — download call recordings
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      # Anthropic — transcript summarisation
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      # Shared secret for AI worker → NestJS callback
      AI_WORKER_SECRET: ${AI_WORKER_SECRET:-}
      # NestJS API URL (internal docker network)
      API_URL: http://api:3000
      # Whisper model: "off" = stub, "base" = real (requires heavy ML deps)
      WHISPER_MODEL: ${WHISPER_MODEL:-off}
    ports:
      - "${AI_WORKER_PORT:-8000}:8000"
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  # ── Observability stack ────────────────────────────────────────────────
  # Opt-in via `--profile observability`. Off by default so a cold deploy
  # doesn't pay the ~800MB image cost + RAM for Prometheus+Grafana until
  # there's traffic worth scraping.
  #   docker compose --profile observability up -d prometheus grafana
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: amass-prometheus
    restart: unless-stopped
    profiles: ["observability"]
    # Loopback-bind: /metrics is proxied via Caddy + auth in Nest.
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d

  grafana:
    image: grafana/grafana:11.2.2
    container_name: amass-grafana
    restart: unless-stopped
    profiles: ["observability"]
    ports:
      - "127.0.0.1:3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-change-me-in-env}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana-provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus

  # ── Mock services for local verification ───────────────────────────
  # All under `--profile mocks`, so a normal `docker compose up` doesn't
  # boot them. Used by pnpm mocks:up + the verification suite.

  # Fake SMTP server with a web UI inbox at http://localhost:8025.
  mailpit:
    image: axllent/mailpit:v1.21
    container_name: amass-mailpit
    profiles: ["mocks"]
    restart: unless-stopped
    environment:
      MP_MAX_MESSAGES: "5000"
      MP_DATABASE: /data/mailpit.db
      MP_SMTP_AUTH_ACCEPT_ANY: "true"
      MP_SMTP_AUTH_ALLOW_INSECURE: "true"
    ports:
      - "127.0.0.1:1025:1025"
      - "127.0.0.1:8025:8025"
    volumes:
      - mailpit_data:/data
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:8025/api/v1/info"]
      interval: 10s
      timeout: 3s
      retries: 5

  # Official Stripe API mock — supports the full Stripe REST surface
  # against fixtures. We point STRIPE clients at it via `host: stripe-mock`.
  stripe-mock:
    image: stripe/stripe-mock:v0.193.0
    container_name: amass-stripe-mock
    profiles: ["mocks"]
    restart: unless-stopped
    ports:
      - "127.0.0.1:12111:12111"
      - "127.0.0.1:12112:12112"

  # Custom Express container exposing Twilio, Meta WhatsApp, Google OAuth,
  # Microsoft OAuth, ANAF e-Factura and a generic webhook listener.
  # Network aliases let the API resolve each provider's host name —
  # `twilio-mock`, `meta-mock` etc. — even though they all live in the
  # same container on different ports.
  mock-services:
    build:
      context: ../apps/mock-services
      dockerfile: Dockerfile
    container_name: amass-mocks
    environment:
      MOCK_TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-mockauthtoken1234567890abcdef1234}

    profiles: ["mocks"]
    restart: unless-stopped
    networks:
      default:
        aliases:
          - twilio-mock
          - meta-mock
          - google-mock
          - microsoft-mock
          - anaf-mock
          - webhook-mock
          - ai-mock
    ports:
      - "127.0.0.1:3001:3001" # twilio
      - "127.0.0.1:3002:3002" # meta-whatsapp
      - "127.0.0.1:3003:3003" # google-oauth
      - "127.0.0.1:3004:3004" # microsoft-oauth
      - "127.0.0.1:3005:3005" # anaf
      - "127.0.0.1:3006:3006" # webhook listener
      - "127.0.0.1:3007:3007" # ai (openai/gemini fallback)

volumes:
  postgres_data:
  redis_data:
  minio_data:
  caddy_data:
  caddy_config:
  prometheus_data:
  grafana_data:
  mailpit_data:
