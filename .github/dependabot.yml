version: 2
updates:
  # Root monorepo npm manifest — covers all workspace packages via pnpm-lock.yaml.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Bucharest"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "npm"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      nestjs:
        patterns:
          - "@nestjs/*"
      prisma:
        patterns:
          - "prisma"
          - "@prisma/*"
      tanstack:
        patterns:
          - "@tanstack/*"
      sentry:
        patterns:
          - "@sentry/*"
      testing:
        patterns:
          - "vitest"
          - "@testing-library/*"
          - "@types/*"
          - "typescript"
          - "eslint*"
          - "typescript-eslint"
    ignore:
      # Major React bumps touch all FE — pin to manual review.
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]

  # Python AI worker (FastAPI + Whisper + Presidio stack).
  - package-ecosystem: "pip"
    directory: "/apps/ai-worker"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Bucharest"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "python"
    commit-message:
      prefix: "chore(ai-deps)"

  # GitHub Actions versions.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "chore(ci)"

  # Docker base images (API + AI worker).
  - package-ecosystem: "docker"
    directory: "/apps/api"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "docker"
  - package-ecosystem: "docker"
    directory: "/apps/ai-worker"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "docker"
