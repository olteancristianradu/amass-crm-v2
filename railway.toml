# Repo-root Railway config is intentionally minimal.
#
# This monorepo has 3 deployables: `api`, `web`, `ai-worker`. Each MUST be
# its own Railway service, configured as follows (in the Railway dashboard):
#
#   Root Directory        = (blank — the REPO ROOT is the build context,
#                           required for the pnpm workspace to resolve
#                           `@amass/shared`)
#   Config-as-Code Path   = apps/<name>/railway.toml
#                           (Railway reads this file to pick the Dockerfile,
#                           healthcheck, watch patterns. Without it, Railway
#                           falls back to looking for ./Dockerfile at repo
#                           root — which produces the
#                             `Dockerfile 'Dockerfile' does not exist`
#                           error.)
#
# Railway does NOT support:
#   • the `[[services]]` table-array form (silently ignored);
#   • a `buildContextPath` field (the context always equals Root Directory).
#
# Each app's `railway.toml` declares `dockerfilePath` relative to repo root.
# This file exists only so Railway's auto-detection at repo-level doesn't
# panic; actual settings live per-service.

[build]
builder = "DOCKERFILE"
